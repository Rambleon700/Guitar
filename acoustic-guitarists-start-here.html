<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acoustic Guitarists Start Here</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --charcoal:#191715;
    --charcoal-2:#221e1a;
    --wood:#3c2a1e;
    --wood-light:#5a3f2c;
    --wood-grain:#2c2019;
    --amber:#e0a64c;
    --amber-bright:#f3c272;
    --amber-dim:#8a6730;
    --paper:#ede4d3;
    --paper-dim:#a89a87;
    --line:#3a332c;
    --good:#7fa86b;
    --bad:#c2664f;
    --shadow: 0 12px 28px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--charcoal);
    color:var(--paper);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  h1,h2,h3,.display{font-family:'Fraunces',serif;}
  .mono{font-family:'JetBrains Mono',monospace;}
  a{color:var(--amber);}
  ::selection{background:var(--amber-dim);color:var(--paper);}

  /* texture */
  body{
    background-image:
      radial-gradient(ellipse at top left, rgba(224,166,76,0.05), transparent 55%),
      repeating-linear-gradient(180deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px);
  }

  .app{display:flex; min-height:100vh;}

  /* ---------- SIDEBAR ---------- */
  .sidebar{
    width:300px; flex-shrink:0;
    background:linear-gradient(180deg, var(--charcoal-2), var(--wood-grain) 700%);
    border-right:1px solid var(--line);
    padding:22px 0 40px;
    position:sticky; top:0; height:100vh; overflow-y:auto;
  }
  .brand{padding:0 20px 18px; border-bottom:1px solid var(--line); margin-bottom:10px;}
  .brand .eyebrow{
    font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.16em;
    color:var(--amber); text-transform:uppercase; opacity:.85;
  }
  .brand h1{font-size:21px; line-height:1.18; margin:6px 0 10px; font-weight:600; color:var(--paper);}
  .progress-wrap{display:flex; align-items:center; gap:9px;}
  .progress-track{flex:1; height:5px; background:#000; border-radius:3px; overflow:hidden; border:1px solid var(--line);}
  .progress-fill{height:100%; background:linear-gradient(90deg, var(--amber-dim), var(--amber)); width:0%; transition:width .4s ease;}
  .progress-label{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--paper-dim); white-space:nowrap;}

  .module{margin-top:4px;}
  .module-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 20px 8px; cursor:pointer; user-select:none;
  }
  .module-head .mname{
    font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--paper-dim);
  }
  .module-head .mcount{font-size:10.5px; color:var(--amber-dim); font-family:'JetBrains Mono',monospace;}
  .module-head:hover .mname{color:var(--amber);}
  .lesson-list{list-style:none; margin:0; padding:0;}
  .lesson-item{
    display:flex; align-items:center; gap:11px;
    padding:9px 20px 9px 16px; cursor:pointer; position:relative;
    border-left:2px solid transparent;
  }
  .lesson-item:hover{background:rgba(224,166,76,0.06);}
  .lesson-item.active{background:rgba(224,166,76,0.10); border-left:2px solid var(--amber);}
  .lesson-dot{
    width:20px; height:20px; border-radius:50%; flex-shrink:0;
    border:1.5px solid var(--line); display:flex; align-items:center; justify-content:center;
    font-size:10px; font-family:'JetBrains Mono',monospace; color:var(--paper-dim);
    background:var(--charcoal);
  }
  .lesson-item.active .lesson-dot{border-color:var(--amber); color:var(--amber);}
  .lesson-item.done .lesson-dot{background:var(--amber); border-color:var(--amber); color:var(--charcoal);}
  .lesson-text{flex:1; min-width:0;}
  .lesson-title{font-size:13.5px; color:var(--paper); line-height:1.3;}
  .lesson-item.active .lesson-title{color:var(--amber-bright); font-weight:600;}
  .lesson-dur{font-size:10.5px; color:var(--paper-dim); font-family:'JetBrains Mono',monospace; flex-shrink:0;}

  .sidebar-foot{padding:18px 20px 0; margin-top:10px; border-top:1px solid var(--line);}
  .sidebar-foot p{font-size:11.5px; color:var(--paper-dim); line-height:1.5; margin:12px 0 0;}

  /* ---------- MAIN ---------- */
  .main{flex:1; min-width:0; padding:48px 56px 100px; max-width:880px;}
  .lesson-head{margin-bottom:30px;}
  .crumb{
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--amber); margin-bottom:10px; display:flex; gap:10px; align-items:center;
  }
  .crumb .sep{color:var(--line);}
  .crumb .mod{color:var(--paper-dim);}
  .lesson-head h2{font-size:34px; line-height:1.15; margin:0 0 12px; font-weight:600; color:var(--paper);}
  .meta-row{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
  .pill{
    font-family:'JetBrains Mono',monospace; font-size:11px; padding:5px 11px; border-radius:99px;
    border:1px solid var(--line); color:var(--paper-dim); display:inline-flex; align-items:center; gap:6px;
  }
  .pill.amber{border-color:var(--amber-dim); color:var(--amber-bright);}

  .tagline{
    font-family:'Fraunces',serif; font-style:italic; font-size:18px; color:var(--amber-bright);
    margin:18px 0 0; font-weight:400; line-height:1.4; max-width:62ch;
  }

  .section{margin-top:34px;}
  .section h3{font-size:15px; text-transform:uppercase; letter-spacing:.06em; color:var(--amber); margin:0 0 12px; font-weight:600;}
  .section p{font-size:15.5px; line-height:1.75; color:#d8cdbb; margin:0 0 12px;}
  .section ul{margin:0 0 12px; padding-left:20px;}
  .section li{font-size:15.5px; line-height:1.7; color:#d8cdbb; margin-bottom:7px;}
  .section li::marker{color:var(--amber);}

  .tip{
    border-left:3px solid var(--amber);
    background:linear-gradient(90deg, rgba(224,166,76,0.08), transparent);
    padding:14px 18px; border-radius:0 8px 8px 0; margin:18px 0;
  }
  .tip .tip-label{font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--amber); margin-bottom:5px;}
  .tip p{margin:0; font-size:14.5px; color:#e3d9c8;}

  /* ---------- CHORD DIAGRAMS ---------- */
  .chord-row{display:flex; flex-wrap:wrap; gap:22px; margin:20px 0 8px;}
  .chord-card{
    background:linear-gradient(180deg, var(--wood-grain), var(--charcoal-2));
    border:1px solid var(--line); border-radius:12px; padding:16px 16px 14px;
    width:172px; box-shadow:var(--shadow);
  }
  .chord-card .cname{font-family:'Fraunces',serif; font-weight:600; font-size:17px; color:var(--amber-bright); margin-bottom:2px;}
  .chord-card .chint{font-size:11px; color:var(--paper-dim); margin-bottom:10px; min-height:14px;}
  .chord-svg-wrap{display:flex; justify-content:center;}
  .chord-card .strum-all{
    width:100%; margin-top:10px; padding:7px 0; background:var(--amber-dim); color:#1b1209; border:none;
    border-radius:6px; font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; letter-spacing:.04em;
    cursor:pointer; text-transform:uppercase;
  }
  .chord-card .strum-all:hover{background:var(--amber);}
  .fret-string{cursor:pointer;}
  .fret-string:hover circle{filter:brightness(1.3);}

  /* ---------- STRUM PLAYER ---------- */
  .strum-player{
    background:var(--wood-grain); border:1px solid var(--line); border-radius:12px;
    padding:20px 22px; margin:20px 0;
  }
  .strum-player .sp-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px;}
  .sp-title{font-family:'JetBrains Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--amber);}
  .sp-controls{display:flex; align-items:center; gap:14px;}
  .play-btn{
    width:38px; height:38px; border-radius:50%; border:1px solid var(--amber-dim); background:var(--amber);
    color:#1b1209; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center;
  }
  .play-btn:hover{background:var(--amber-bright);}
  .bpm-row{display:flex; align-items:center; gap:8px;}
  .bpm-row input[type=range]{width:110px; accent-color:var(--amber);}
  .bpm-val{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--paper-dim); width:62px;}
  .beat-track{display:flex; gap:7px; flex-wrap:wrap;}
  .beat-cell{
    flex:1; min-width:34px; text-align:center; padding:12px 0 9px; border-radius:8px;
    background:var(--charcoal-2); border:1px solid var(--line); font-family:'JetBrains Mono',monospace;
    font-size:14px; color:var(--paper-dim); transition:all .08s ease;
  }
  .beat-cell.rest{color:#5a5048;}
  .beat-cell.lit{background:var(--amber); color:#1b1209; border-color:var(--amber); transform:translateY(-2px); box-shadow:0 4px 10px rgba(224,166,76,.35);}

  /* ---------- QUIZ ---------- */
  .quiz{
    margin-top:38px; background:linear-gradient(180deg, var(--wood), var(--wood-grain));
    border:1px solid var(--wood-light); border-radius:14px; padding:24px 26px; box-shadow:var(--shadow);
  }
  .quiz .qlabel{font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--amber); margin-bottom:8px;}
  .quiz .qtext{font-size:16.5px; color:var(--paper); margin-bottom:16px; font-weight:500;}
  .qopts{display:flex; flex-direction:column; gap:9px;}
  .qopt{
    text-align:left; padding:11px 14px; border-radius:8px; border:1px solid var(--line);
    background:rgba(0,0,0,.18); color:#e3d9c8; font-size:14.5px; cursor:pointer; font-family:'Inter',sans-serif;
  }
  .qopt:hover{border-color:var(--amber-dim);}
  .qopt.correct{background:rgba(127,168,107,0.18); border-color:var(--good); color:#cfe5c2;}
  .qopt.incorrect{background:rgba(194,102,79,0.18); border-color:var(--bad); color:#f0cdc3;}
  .qexplain{margin-top:14px; font-size:14px; line-height:1.6; color:var(--paper-dim); display:none;}
  .qexplain.show{display:block;}

  /* ---------- FOOTER NAV ---------- */
  .lesson-footer{
    margin-top:44px; padding-top:24px; border-top:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap;
  }
  .btn{
    font-family:'Inter',sans-serif; font-size:13.5px; font-weight:600; padding:11px 20px; border-radius:8px;
    cursor:pointer; border:1px solid var(--line); background:transparent; color:var(--paper-dim);
    display:inline-flex; align-items:center; gap:8px;
  }
  .btn:hover{border-color:var(--amber-dim); color:var(--paper);}
  .btn.primary{background:var(--amber); border-color:var(--amber); color:#1b1209;}
  .btn.primary:hover{background:var(--amber-bright);}
  .btn.done{background:rgba(127,168,107,0.16); border-color:var(--good); color:#cfe5c2;}

  /* mobile */
  .menu-toggle{display:none;}
  @media (max-width: 880px){
    .app{flex-direction:column;}
    .sidebar{
      width:100%; height:auto; position:relative; top:0; max-height:none; padding-bottom:8px;
    }
    .sidebar.collapsed .module-list{display:none;}
    .menu-toggle{
      display:block; width:100%; text-align:left; background:none; border:none; color:var(--paper-dim);
      font-family:'JetBrains Mono',monospace; font-size:11px; padding:10px 20px; cursor:pointer; letter-spacing:.08em;
    }
    .main{padding:32px 20px 80px;}
    .lesson-head h2{font-size:27px;}
    .chord-card{width:148px;}
  }
</style>
</head>
<body>
<div class="app">

  <nav class="sidebar" id="sidebar">
    <div class="brand">
      <div class="eyebrow">Acoustic &middot; Beginner Course</div>
      <h1>Acoustic Guitarists Start Here</h1>
      <div class="progress-wrap">
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-label" id="progressLabel">0 / 20</div>
      </div>
    </div>
    <button class="menu-toggle" id="menuToggle">&#9776; LESSONS</button>
    <div id="moduleList"></div>
    <div class="sidebar-foot">
      <p>Five chords, four sections, one song. By the end you'll be playing &ldquo;The Campfire Special&rdquo; start to finish.</p>
    </div>
  </nav>

  <main class="main" id="main"></main>

</div>

<script>
/* ============================== AUDIO ENGINE ============================== */
var audioCtx = null;
function getCtx(){
  if(!audioCtx){ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  if(audioCtx.state === 'suspended'){ audioCtx.resume(); }
  return audioCtx;
}
var OPEN_FREQ = [82.41, 110.00, 146.83, 196.00, 246.94, 329.63]; // low E, A, D, G, B, high e

function noteFreq(stringIdx, fret){
  return OPEN_FREQ[stringIdx] * Math.pow(2, fret / 12);
}

function pluck(freq, when){
  var ctx = getCtx();
  var t0 = ctx.currentTime + (when || 0);
  var osc1 = ctx.createOscillator();
  var osc2 = ctx.createOscillator();
  var gain = ctx.createGain();
  var filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = freq * 5;
  osc1.type = 'triangle';
  osc2.type = 'sine';
  osc1.frequency.value = freq;
  osc2.frequency.value = freq * 2;
  var g2 = ctx.createGain();
  g2.gain.value = 0.18;
  osc2.connect(g2);
  g2.connect(filter);
  osc1.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);
  gain.gain.setValueAtTime(0.0001, t0);
  gain.gain.exponentialRampToValueAtTime(0.32, t0 + 0.008);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 1.35);
  osc1.start(t0); osc2.start(t0);
  osc1.stop(t0 + 1.4); osc2.stop(t0 + 1.4);
}

function click(when, accent){
  var ctx = getCtx();
  var t0 = ctx.currentTime + (when || 0);
  var osc = ctx.createOscillator();
  var gain = ctx.createGain();
  osc.type = 'square';
  osc.frequency.value = accent ? 1500 : 1000;
  osc.connect(gain); gain.connect(ctx.destination);
  gain.gain.setValueAtTime(accent ? 0.12 : 0.07, t0);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.05);
  osc.start(t0); osc.stop(t0 + 0.06);
}

function playChordObj(chord, strumMs){
  var stagger = (strumMs === undefined ? 28 : strumMs) / 1000;
  var i = 0;
  for(var s = 0; s < 6; s++){
    var f = chord.frets[s];
    if(f === -1) continue;
    pluck(noteFreq(s, f), i * stagger);
    i++;
  }
}

/* ============================== CHORD DATA ============================== */
// fret arrays: [lowE, A, D, G, B, highE]  -1 = muted, 0 = open
var CHORDS = {
  EASY_G:  { display:'G (easy)', frets:[-1,2,0,0,0,3], fingers:[0,1,0,0,0,2] },
  FULL_G:  { display:'G (full)', frets:[3,2,0,0,0,3],  fingers:[2,1,0,0,0,3] },
  EM:      { display:'Em',       frets:[0,2,2,0,0,0],  fingers:[0,1,2,0,0,0] },
  EASY_C:  { display:'C (easy)', frets:[-1,3,2,0,0,0], fingers:[0,3,2,0,0,0] },
  FULL_C:  { display:'C (full)', frets:[-1,3,2,0,1,0], fingers:[0,3,2,0,1,0] },
  FULL_D:  { display:'D',        frets:[-1,-1,0,2,3,2],fingers:[0,0,0,1,3,2] },
  CADD9:   { display:'Cadd9',    frets:[-1,3,2,0,3,0], fingers:[0,2,1,0,4,0] },
  DSUS4:   { display:'Dsus4',    frets:[-1,-1,0,2,3,3],fingers:[0,0,0,1,2,3] },
  EM7:     { display:'Em7',      frets:[0,2,0,0,0,0],  fingers:[0,1,0,0,0,0] },
  AM7:     { display:'Am7',      frets:[-1,0,2,0,1,0], fingers:[0,0,2,0,1,0] }
};
var STRING_NAMES = ['Low E','A','D','G','B','High e'];

/* ============================== SVG CHORD DIAGRAM ============================== */
function buildChordSVG(chord, size){
  size = size || 132;
  var w = size, h = size * 1.18;
  var marginTop = h * 0.22, marginSide = w * 0.12;
  var gridW = w - marginSide * 2, gridH = h - marginTop - h*0.06;
  var strings = 6, frets = 4;
  var stepX = gridW / (strings - 1);
  var stepY = gridH / frets;
  var svg = '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg">';

  // nut
  svg += '<rect x="'+marginSide+'" y="'+marginTop+'" width="'+gridW+'" height="3" fill="#e0a64c"></rect>';
  // frets
  for(var fr=1; fr<=frets; fr++){
    var y = marginTop + fr*stepY;
    svg += '<line x1="'+marginSide+'" y1="'+y+'" x2="'+(marginSide+gridW)+'" y2="'+y+'" stroke="#4a4137" stroke-width="1"></line>';
  }
  // strings
  for(var s=0; s<strings; s++){
    var x = marginSide + s*stepX;
    svg += '<line x1="'+x+'" y1="'+marginTop+'" x2="'+x+'" y2="'+(marginTop+gridH)+'" stroke="#857a6b" stroke-width="1.2"></line>';
  }

  // open/mute markers above nut + finger dots
  for(var s2=0; s2<strings; s2++){
    var x2 = marginSide + s2*stepX;
    var f = chord.frets[s2];
    if(f === -1){
      svg += '<text x="'+x2+'" y="'+(marginTop-7)+'" text-anchor="middle" font-size="'+(size*0.085)+'" fill="#c2664f" font-family="JetBrains Mono, monospace">&#10005;</text>';
    } else if(f === 0){
      svg += '<circle cx="'+x2+'" cy="'+(marginTop-11)+'" r="'+(size*0.045)+'" fill="none" stroke="#e0a64c" stroke-width="1.6"></circle>';
    } else {
      var fy = marginTop + (f - 0.5)*stepY;
      svg += '<g class="fret-string" data-string="'+s2+'" data-fret="'+f+'">';
      svg += '<circle cx="'+x2+'" cy="'+fy+'" r="'+(size*0.075)+'" fill="#e0a64c"></circle>';
      if(chord.fingers && chord.fingers[s2]){
        svg += '<text x="'+x2+'" y="'+(fy+size*0.03)+'" text-anchor="middle" font-size="'+(size*0.075)+'" fill="#1b1209" font-weight="700" font-family="Inter, sans-serif">'+chord.fingers[s2]+'</text>';
      }
      svg += '</g>';
    }
  }
  svg += '</svg>';
  return svg;
}

function buildSingleNoteSVG(stringIdx, fret, size){
  size = size || 132;
  var w = size, h = size * 1.18;
  var marginTop = h * 0.22, marginSide = w * 0.12;
  var gridW = w - marginSide * 2, gridH = h - marginTop - h*0.06;
  var strings = 6, frets = 4;
  var stepX = gridW / (strings - 1);
  var stepY = gridH / frets;
  var svg = '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg">';
  svg += '<rect x="'+marginSide+'" y="'+marginTop+'" width="'+gridW+'" height="3" fill="#e0a64c"></rect>';
  for(var fr=1; fr<=frets; fr++){
    var y = marginTop + fr*stepY;
    svg += '<line x1="'+marginSide+'" y1="'+y+'" x2="'+(marginSide+gridW)+'" y2="'+y+'" stroke="#4a4137" stroke-width="1"></line>';
  }
  for(var s=0; s<strings; s++){
    var x = marginSide + s*stepX;
    svg += '<line x1="'+x+'" y1="'+marginTop+'" x2="'+x+'" y2="'+(marginTop+gridH)+'" stroke="#857a6b" stroke-width="1.2"></line>';
  }
  var x2 = marginSide + stringIdx*stepX;
  var fy = marginTop + (fret - 0.5)*stepY;
  svg += '<g class="fret-string" data-string="'+stringIdx+'" data-fret="'+fret+'">';
  svg += '<circle cx="'+x2+'" cy="'+fy+'" r="'+(size*0.08)+'" fill="#e0a64c"></circle>';
  svg += '</g>';
  svg += '</svg>';
  return svg;
}

function renderChordCard(key, hint){
  var chord = CHORDS[key];
  var svg = buildChordSVG(chord);
  var html = '<div class="chord-card">';
  html += '<div class="cname">'+chord.display+'</div>';
  html += '<div class="chint">'+(hint || 'tap a dot to hear it')+'</div>';
  html += '<div class="chord-svg-wrap" data-chordkey="'+key+'">'+svg+'</div>';
  html += '<button class="strum-all" data-strumkey="'+key+'">Strum it &#9835;</button>';
  html += '</div>';
  return html;
}

function wireChordCards(container){
  var wraps = container.querySelectorAll('.chord-svg-wrap');
  wraps.forEach(function(wrap){
    var targets = wrap.querySelectorAll('.fret-string');
    targets.forEach(function(t){
      t.addEventListener('click', function(){
        var s = parseInt(t.getAttribute('data-string'), 10);
        var f = parseInt(t.getAttribute('data-fret'), 10);
        pluck(noteFreq(s, f));
      });
    });
  });
  var btns = container.querySelectorAll('.strum-all');
  btns.forEach(function(btn){
    btn.addEventListener('click', function(){
      var key = btn.getAttribute('data-strumkey');
      playChordObj(CHORDS[key]);
    });
  });

  singles.forEach(function(t){

/* ============================== STRUM PLAYER ============================== */
function renderStrumPlayer(id, pattern, bpm){
  var cells = '';
  for(var i=0;i<pattern.length;i++){
    var d = pattern[i];
    var cls = (d === '-') ? 'beat-cell rest' : 'beat-cell';
    var label = d === 'D' ? '&#8595;' : (d === 'U' ? '&#8593;' : '&middot;');
    cells += '<div class="beat-cell '+(d==='-'?'rest':'')+'" data-idx="'+i+'">'+label+'</div>';
  }
  var html = '<div class="strum-player" id="'+id+'">';
  html += '<div class="sp-top">';
  html += '<div class="sp-title">Practice Loop</div>';
  html += '<div class="sp-controls">';
  html += '<button class="play-btn" data-action="toggle">&#9658;</button>';
  html += '<div class="bpm-row"><span class="bpm-val" data-role="bpmval">'+bpm+' bpm</span><input type="range" min="60" max="140" value="'+bpm+'" data-role="bpmslider"></div>';
  html += '</div></div>';
  html += '<div class="beat-track">'+cells+'</div>';
  html += '</div>';
  return html;
}

function wireStrumPlayer(container, id, pattern){
  var root = container.querySelector('#'+id);
  if(!root) return;
  var playBtn = root.querySelector('[data-action="toggle"]');
  var slider = root.querySelector('[data-role="bpmslider"]');
  var bpmval = root.querySelector('[data-role="bpmval"]');
  var cells = root.querySelectorAll('.beat-cell');
  var playing = false;
  var step = 0;
  var timer = null;
  var bpm = parseInt(slider.value, 10);

  function intervalMs(){
    // pattern is in 8th notes, so half a quarter-note beat
    return (60000 / bpm) / 2;
  }

  function tick(){
    cells.forEach(function(c){ c.classList.remove('lit'); });
    var cell = cells[step];
    cell.classList.add('lit');
    var d = pattern[step];
    if(d === 'D' || d === 'U'){
      click(0, d === 'D');
    }
    step = (step + 1) % pattern.length;
  }

  function start(){
    playing = true;
    playBtn.innerHTML = '&#10074;&#10074;';
    step = 0;
    tick();
    timer = setInterval(tick, intervalMs());
  }
  function stop(){
    playing = false;
    playBtn.innerHTML = '&#9658;';
    clearInterval(timer);
    cells.forEach(function(c){ c.classList.remove('lit'); });
  }

  playBtn.addEventListener('click', function(){
    getCtx();
    if(playing){ stop(); } else { start(); }
  });
  slider.addEventListener('input', function(){
    bpm = parseInt(slider.value, 10);
    bpmval.textContent = bpm + ' bpm';
    if(playing){ clearInterval(timer); timer = setInterval(tick, intervalMs()); }
  });
}

/* ============================== STATE ============================== */
var completed = {};
var currentId = LESSONS[0].id;

/* ============================== SIDEBAR RENDER ============================== */
function renderSidebar(){
  var wrap = document.getElementById('moduleList');
  wrap.className = 'module-list';
  var html = '';
  for(var m=1; m<=4; m++){
    var lessons = LESSONS.filter(function(l){ return l.module === m; });
    html += '<div class="module" data-module="'+m+'">';
    html += '<div class="module-head"><span class="mname">Module '+m+' &middot; '+MODULES[m-1]+'</span><span class="mcount">'+lessons.length+' lessons</span></div>';
    html += '<ul class="lesson-list">';
    lessons.forEach(function(l){
      var isActive = (l.id === currentId);
      var isDone = !!completed[l.id];
      html += '<li class="lesson-item'+(isActive?' active':'')+(isDone?' done':'')+'" data-id="'+l.id+'">';
      html += '<span class="lesson-dot">'+(isDone ? '&#10003;' : l.number)+'</span>';
      html += '<span class="lesson-text"><span class="lesson-title">'+l.title+'</span></span>';
      html += '<span class="lesson-dur">'+l.duration+'</span>';
      html += '</li>';
    });
    html += '</ul></div>';
  }
  wrap.innerHTML = html;
  wrap.querySelectorAll('.lesson-item').forEach(function(item){
    item.addEventListener('click', function(){
      currentId = item.getAttribute('data-id');
      renderAll();
      window.scrollTo({top:0, behavior:'smooth'});
    });
  });
  updateProgress();
}

function updateProgress(){
  var done = Object.keys(completed).filter(function(k){ return completed[k]; }).length;
  document.getElementById('progressLabel').textContent = done + ' / ' + LESSONS.length;
  document.getElementById('progressFill').style.width = (done / LESSONS.length * 100) + '%';
}

/* ============================== MAIN RENDER ============================== */
function findLesson(id){
  for(var i=0;i<LESSONS.length;i++){ if(LESSONS[i].id === id) return LESSONS[i]; }
  return LESSONS[0];
}
function lessonIndex(id){
  for(var i=0;i<LESSONS.length;i++){ if(LESSONS[i].id === id) return i; }
  return 0;
}

function renderMain(){
  var lesson = findLesson(currentId);
  var main = document.getElementById('main');
  var html = '';

  html += '<div class="lesson-head">';
  html += '<div class="crumb">Module '+lesson.module+' <span class="sep">/</span> <span class="mod">'+MODULES[lesson.module-1]+'</span></div>';
  html += '<h2>'+lesson.number+'. '+lesson.title+'</h2>';
  html += '<div class="meta-row"><span class="pill">'+lesson.duration+'</span><span class="pill amber">Lesson '+lesson.number+' of 5</span></div>';
  html += '<p class="tagline">'+lesson.tagline+'</p>';
  html += '</div>';

  if(lesson.single){
    html += '<div class="section"><h3>Find The Note</h3><div class="chord-row"><div class="chord-card">';
    html += '<div class="cname">'+STRING_NAMES[lesson.single.string]+' string</div>';
    html += '<div class="chint">fret '+lesson.single.fret+' &middot; tap to hear it</div>';
    html += '<div class="chord-svg-wrap single-note-wrap">'+buildSingleNoteSVG(lesson.single.string, lesson.single.fret)+'</div>';
    html += '</div></div></div>';
  }

  if(lesson.chords && lesson.chords.length){
    html += '<div class="section"><h3>Chords In This Lesson</h3><div class="chord-row">';
    lesson.chords.forEach(function(key){ html += renderChordCard(key); });
    html += '</div></div>';
  }

  lesson.body.forEach(function(block){
    html += '<div class="section"><h3>'+block.h+'</h3>';
    block.p.forEach(function(para){ html += '<p>'+para+'</p>'; });
    html += '</div>';
  });

  if(lesson.strum){
    html += '<div class="section"><h3>Practice Loop</h3>';
    html += renderStrumPlayer('strumPlayer_'+lesson.id, lesson.strum.pattern, lesson.strum.bpm);
    html += '</div>';
  }

  if(lesson.tip){
    html += '<div class="tip"><div class="tip-label">Practice Tip</div><p>'+lesson.tip+'</p></div>';
  }

  if(lesson.quiz){
    html += '<div class="quiz" id="quizBlock">';
    html += '<div class="qlabel">Quick Check</div>';
    html += '<div class="qtext">'+lesson.quiz.q+'</div>';
    html += '<div class="qopts">';
    lesson.quiz.options.forEach(function(opt, idx){
      html += '<button class="qopt" data-idx="'+idx+'">'+opt+'</button>';
    });
    html += '</div>';
    html += '<div class="qexplain" id="qexplain">'+lesson.quiz.explain+'</div>';
    html += '</div>';
  }

  var idx = lessonIndex(currentId);
  var isDone = !!completed[currentId];
  html += '<div class="lesson-footer">';
  html += '<button class="btn" id="prevBtn" '+(idx===0?'disabled style="opacity:.35;cursor:default;"':'')+'>&#8592; Previous</button>';
  html += '<button class="btn '+(isDone?'done':'primary')+'" id="completeBtn">'+(isDone ? '&#10003; Lesson Complete' : 'Mark Lesson Complete')+'</button>';
  html += '<button class="btn" id="nextBtn" '+(idx===LESSONS.length-1?'disabled style="opacity:.35;cursor:default;"':'')+'>Next Lesson &#8594;</button>';
  html += '</div>';

  main.innerHTML = html;
  wireChordCards(main);
  if(lesson.strum){ wireStrumPlayer(main, 'strumPlayer_'+lesson.id, lesson.strum.pattern); }
  wireQuiz(lesson);
  wireFooter(idx);
}

function wireQuiz(lesson){
  if(!lesson.quiz) return;
  var block = document.getElementById('quizBlock');
  var opts = block.querySelectorAll('.qopt');
  var answered = false;
  opts.forEach(function(btn){
    btn.addEventListener('click', function(){
      if(answered) return;
      answered = true;
      var chosen = parseInt(btn.getAttribute('data-idx'), 10);
      opts.forEach(function(o, i){
        if(i === lesson.quiz.correct){ o.classList.add('correct'); }
        else if(i === chosen){ o.classList.add('incorrect'); }
      });
      document.getElementById('qexplain').classList.add('show');
    });
  });
}

function wireFooter(idx){
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');
  var completeBtn = document.getElementById('completeBtn');
  if(prevBtn && idx > 0){
    prevBtn.addEventListener('click', function(){
      currentId = LESSONS[idx-1].id; renderAll(); window.scrollTo({top:0, behavior:'smooth'});
    });
  }
  if(nextBtn && idx < LESSONS.length - 1){
    nextBtn.addEventListener('click', function(){
      currentId = LESSONS[idx+1].id; renderAll(); window.scrollTo({top:0, behavior:'smooth'});
    });
  }
  completeBtn.addEventListener('click', function(){
    completed[currentId] = !completed[currentId];
    renderAll();
  });
}

function renderAll(){
  renderSidebar();
  renderMain();
}

/* mobile menu toggle */
document.getElementById('menuToggle').addEventListener('click', function(){
  document.getElementById('sidebar').classList.toggle('collapsed');
});

renderAll();
</script>
